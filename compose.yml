services:

  packbase:
    build: .
    command:
      - /bin/sh
      - -lc
      - |
        if [ ! -f /data/git/hello.git/HEAD ]; then
          sh /seed/seed-packbase-data.sh /data /fixtures
        fi
        exec /usr/local/bin/packbase
    environment:
      PACKBASE_ROOT: /data
      PACKBASE_PORT: "8080"
      PACKBASE_TOKEN: "${PACKBASE_TOKEN}"
    volumes:
      - ./data:/data
      - ./scripts/create-fixture-repos.sh:/seed/create-fixture-repos.sh:ro
      - ./scripts/seed-packbase-data.sh:/seed/seed-packbase-data.sh:ro
      - ./test/fixtures:/fixtures:ro
    restart: unless-stopped
    # Not exposed directly — Caddy is the only public entry point.

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      PACKBASE_DOMAIN: "${PACKBASE_DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - packbase
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
