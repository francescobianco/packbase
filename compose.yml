services:

  packbase:
    build: .
    environment:
      PACKBASE_ROOT: /data
      PACKBASE_PORT: "8080"
      PACKBASE_TOKEN: "${PACKBASE_TOKEN}"
    volumes:
      - packbase-data:/data
    restart: unless-stopped
    # Not exposed directly — Caddy is the only public entry point.

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      PACKBASE_DOMAIN: "${PACKBASE_DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - packbase
    restart: unless-stopped

volumes:
  packbase-data:
  caddy-data:
  caddy-config:
